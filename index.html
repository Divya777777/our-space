<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Space 🌙</title>
  <meta name="description" content="A private space just for the two of us." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="index-page">

  <canvas id="starCanvas"></canvas>
  <div class="shooting-stars" id="shootingStars"></div>

  <div class="moon">
    <div class="moon-glow"></div>
    <div class="moon-craters">
      <div class="crater c1"></div>
      <div class="crater c2"></div>
      <div class="crater c3"></div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-label">✦ A place just for us ✦</div>
    <h1 class="hero-title">Our Space</h1>
    <p class="hero-subtitle">Voice chat + music, under the stars 🌙</p>

    <div class="join-card glass-card">
      <div class="card-icon">💫</div>
      <h2 class="card-title">Enter Our Space</h2>
      <p class="card-desc">Share a room code and PIN with each other</p>

      <div class="input-group">
        <label for="nameInput" class="input-label">Your Name</label>
        <div class="input-wrapper">
          <span class="input-icon">🌸</span>
          <input id="nameInput" type="text" class="glass-input" placeholder="Your name..." maxlength="20"
            autocomplete="off" />
        </div>
      </div>

      <div class="input-group">
        <label for="roomInput" class="input-label">Room Code</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input id="roomInput" type="text" class="glass-input" placeholder="e.g. moonlight42" maxlength="30"
            autocomplete="off" />
        </div>
        <button class="generate-btn" id="generateBtn">✨ Generate</button>
      </div>

      <div class="input-group">
        <label for="pinInput" class="input-label">
          Room PIN <span class="tag-private">🔒 Private</span>
        </label>
        <div class="input-wrapper">
          <span class="input-icon">🛡️</span>
          <input id="pinInput" type="password" class="glass-input" placeholder="Secret PIN (both use the same)..."
            maxlength="30" autocomplete="off" />
        </div>
        <p class="pin-hint">Only people with the exact same PIN can join your room</p>
      </div>

      <div style="display: flex; gap: 15px; margin-top: 10px;">
        <button class="enter-btn secondary-btn" id="joinBtn"
          style="flex:1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
          <span>🚪 Join Room</span>
        </button>
        <button class="enter-btn" id="createBtn" style="flex:1;">
          <span>✨ Create Room</span>
        </button>
      </div>

      <div class="divider"><span>music via</span></div>
      <p class="hint-text">🎵 YouTube — paste any song link, no account needed</p>
    </div>

    <!-- Recent rooms -->
    <div class="recent-section" id="recentSection" style="display:none">
      <div class="recent-label">✦ Recent Rooms ✦</div>
      <div class="recent-rooms-grid" id="recentRooms"></div>
    </div>

    <div class="floating-notes">
      <span class="note n1">♪</span>
      <span class="note n2">♫</span>
      <span class="note n3">♩</span>
      <span class="note n4">♬</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>

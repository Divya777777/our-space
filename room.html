<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Space 🌙 — Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="room-page">

    <canvas id="starCanvas"></canvas>
    <div class="shooting-stars" id="shootingStars"></div>
    <div class="moon moon-corner">
        <div class="moon-glow"></div>
    </div>

    <!-- Header -->
    <header class="room-header glass-card">
        <div class="header-left">
            <div class="logo">🌙 Our Space</div>
            <div class="room-info">
                <span class="room-label">Room:</span>
                <span class="room-code" id="roomCodeDisplay">—</span>
                <button class="copy-btn" id="copyRoomBtn" title="Copy room code">📋</button>
            </div>
        </div>
        <div class="header-center">
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot disconnected"></span>
                <span class="status-text">Waiting for partner…</span>
            </div>
        </div>
        <div class="header-right">
            <span class="user-name-display" id="myNameDisplay"></span>
            <button class="cinema-btn" id="cinemaBtn" title="Cinema mode (F)">🎬</button>
            <button class="leave-btn" id="leaveBtn">Leave 🚀</button>
        </div>
    </header>

    <!-- Main layout -->
    <main class="room-main">

        <!-- Video/Voice section -->
        <section class="video-section">
            <div class="video-grid">
                <!-- My video -->
                <div class="video-panel glass-card" id="myVideoPanel">
                    <div class="video-label" id="myLabel">You 🌙</div>
                    <button class="expand-btn" data-target="myVideoPanel" title="Maximize">⛶</button>
                    <video id="myVideo" autoplay muted playsinline></video>
                    <div class="video-placeholder" id="myPlaceholder">
                        <div class="avatar-ring">
                            <span class="avatar-emoji">🌙</span>
                        </div>
                        <p class="placeholder-name" id="myPlaceholderName">You</p>
                    </div>
                    <div class="video-controls">
                        <button class="vc-btn" id="muteBtn" title="Toggle mic">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93V21h2v-3.07A8.001 8.001 0 0 0 20 10h-2a6 6 0 0 1-12 0H4a8.001 8.001 0 0 0 7 7.93z" />
                            </svg>
                        </button>
                        <button class="vc-btn" id="videoBtn" title="Toggle camera">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M15 8v8H5V8h10m1-2H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4V7c0-.55-.45-1-1-1z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Partner video -->
                <div class="video-panel glass-card" id="partnerVideoPanel">
                    <div class="video-label" id="partnerLabel">Partner 💫</div>
                    <button class="expand-btn" data-target="partnerVideoPanel" title="Maximize">⛶</button>
                    <video id="partnerVideo" autoplay playsinline></video>
                    <div class="video-placeholder" id="partnerPlaceholder">
                        <div class="avatar-ring pulse">
                            <span class="avatar-emoji">💫</span>
                        </div>
                        <p class="placeholder-name" id="partnerPlaceholderName">Waiting…</p>
                    </div>
                </div>
            </div>

            <div class="call-actions">
                <button class="start-call-btn" id="startCallBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" />
                    </svg>
                    Start Call
                </button>
            </div>
        </section>

        <!-- YouTube Music section -->
        <section class="music-section glass-card" id="musicSection">
            <div class="music-header">
                <div class="music-title">
                    <span>🎵</span>
                    <h2>Music Together</h2>
                </div>
                <a href="https://music.youtube.com" target="_blank" class="yt-search-link" title="Open YouTube Music">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    Find songs
                </a>
            </div>

            <!-- URL input -->
            <div class="yt-input-row">
                <div class="input-wrapper yt-url-wrapper">
                    <span class="input-icon">🔗</span>
                    <input type="text" id="ytUrlInput" class="glass-input" placeholder="Paste YouTube URL or song link…"
                        autocomplete="off" />
                </div>
                <button class="yt-play-btn" id="ytLoadBtn">▶ Play</button>
            </div>

            <!-- Idle state -->
            <div class="music-idle" id="musicIdle">
                <div class="music-disc">
                    <div class="disc-outer">
                        <div class="disc-inner">🎵</div>
                    </div>
                </div>
                <p class="music-idle-hint">Paste a YouTube link to play music together</p>
                <p class="music-idle-sub">Both of you will hear the same song 🌙</p>
            </div>

            <!-- Now playing (shown when a track is loaded) -->
            <div class="yt-now-playing-card" id="ytNowPlayingCard" style="display:none">
                <div class="yt-np-label">
                    <span class="np-dot"></span>
                    <span id="ytNowPlayingWho">Now Playing</span>
                </div>

                <!-- YouTube iframe player -->
                <div class="yt-player-wrapper" id="ytPlayerWrapper">
                    <div id="ytPlayer"></div>
                </div>

                <div class="yt-track-meta" id="ytTrackMeta">
                    <div class="track-name" id="ytTrackTitle">—</div>
                </div>

                <!-- Progress -->
                <div class="progress-section">
                    <span class="time-label" id="ytCurrentTime">0:00</span>
                    <div class="progress-bar-bg" id="ytProgressBg">
                        <div class="progress-bar-fill" id="ytProgressFill"></div>
                    </div>
                    <span class="time-label" id="ytTotalTime">0:00</span>
                </div>

                <!-- Controls -->
                <div class="playback-controls">
                    <button class="ctrl-btn play-pause-btn" id="ytPlayPauseBtn">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>
                    <button class="ctrl-btn yt-expand-btn" id="ytExpandBtn" title="Maximize">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                        </svg>
                    </button>
                </div>

                <!-- Volume -->
                <div class="volume-section">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    <input type="range" id="ytVolumeSlider" class="volume-slider" min="0" max="100" value="80" />
                </div>

                <!-- Sync status -->
                <div class="sync-status">
                    <span class="sync-dot"></span>
                    <span id="ytSyncText">Listening together 🌙</span>
                </div>

                <!-- Add to playlist -->
                <button class="add-playlist-btn" id="addToPlaylistBtn">+ Add to Playlist</button>
            </div>

            <!-- Playlist -->
            <div class="playlist-section" id="playlistSection">
                <div class="playlist-tabs">
                    <button class="pl-tab active" data-tab="room">Room</button>
                    <button class="pl-tab" data-tab="personal">Personal</button>
                </div>
                <div class="playlist-header">
                    <div class="playlist-title-row">
                        <select class="playlist-dropdown" id="playlistDropdown">
                            <option value="default">Room Playlist</option>
                        </select>
                        <button class="add-new-pl-btn" id="newPlaylistBtn" title="Create new playlist">+</button>
                    </div>
                    <span class="playlist-count" id="playlistCount">0 songs</span>
                </div>
                <div class="playlist-empty" id="playlistEmpty">No songs yet — add some! 🎵</div>
                <div class="playlist-items" id="playlistItems"></div>
            </div>
        </section>

    </main>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="room.js"></script>
</body>

</html>

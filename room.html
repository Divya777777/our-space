<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Space 🌙 — Room</title>
    <meta name="description" content="Private room — voice chat and synced music." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="room-page">

    <!-- Star canvas -->
    <canvas id="starCanvas"></canvas>
    <div class="shooting-stars" id="shootingStars"></div>

    <!-- Moon (smaller, corner) -->
    <div class="moon moon-corner">
        <div class="moon-glow"></div>
    </div>

    <!-- Top bar -->
    <header class="room-header glass-card">
        <div class="header-left">
            <div class="logo">🌙 Our Space</div>
            <div class="room-info">
                <span class="room-label">Room:</span>
                <span class="room-code" id="roomCodeDisplay">—</span>
                <button class="copy-btn" id="copyRoomBtn" title="Copy room code">📋</button>
            </div>
        </div>
        <div class="header-center">
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot disconnected"></span>
                <span class="status-text">Waiting for partner…</span>
            </div>
        </div>
        <div class="header-right">
            <span class="user-name-display" id="myNameDisplay"></span>
            <button class="leave-btn" id="leaveBtn">Leave 🚀</button>
        </div>
    </header>

    <!-- Main layout -->
    <main class="room-main">

        <!-- Video chat section -->
        <section class="video-section">
            <div class="video-grid">

                <!-- My video -->
                <div class="video-panel glass-card" id="myVideoPanel">
                    <div class="video-label" id="myLabel">You 🌙</div>
                    <video id="myVideo" autoplay muted playsinline></video>
                    <div class="video-placeholder" id="myPlaceholder">
                        <div class="avatar-ring">
                            <span class="avatar-emoji" id="myAvatar">🌙</span>
                        </div>
                        <p class="placeholder-name" id="myPlaceholderName">You</p>
                    </div>
                    <div class="video-controls">
                        <button class="vc-btn" id="muteBtn" title="Toggle microphone">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93V21h2v-3.07A8.001 8.001 0 0 0 20 10h-2a6 6 0 0 1-12 0H4a8.001 8.001 0 0 0 7 7.93z" />
                            </svg>
                        </button>
                        <button class="vc-btn" id="videoBtn" title="Toggle camera">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M15 8v8H5V8h10m1-2H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4V7c0-.55-.45-1-1-1z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Partner video -->
                <div class="video-panel glass-card" id="partnerVideoPanel">
                    <div class="video-label" id="partnerLabel">Partner 💫</div>
                    <video id="partnerVideo" autoplay playsinline></video>
                    <div class="video-placeholder" id="partnerPlaceholder">
                        <div class="avatar-ring pulse">
                            <span class="avatar-emoji">💫</span>
                        </div>
                        <p class="placeholder-name" id="partnerPlaceholderName">Waiting…</p>
                    </div>
                </div>

            </div>

            <!-- Join / Start call button -->
            <div class="call-actions" id="callActions">
                <button class="start-call-btn" id="startCallBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" />
                    </svg>
                    Start Call
                </button>
            </div>
        </section>

        <!-- Spotify sync section -->
        <section class="spotify-section glass-card" id="spotifySection">
            <div class="spotify-header">
                <div class="spotify-title">
                    <span class="spotify-icon">🎵</span>
                    <h2>Synced Music</h2>
                </div>
                <button class="spotify-connect-btn" id="spotifyConnectBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path
                            d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
                    </svg>
                    Connect Spotify
                </button>
            </div>

            <!-- Not connected state -->
            <div class="spotify-disconnected" id="spotifyDisconnected">
                <div class="spotify-disc">
                    <div class="disc-outer">
                        <div class="disc-inner">🎵</div>
                    </div>
                </div>
                <p class="spotify-hint">Connect Spotify to start synced listening</p>
                <p class="spotify-sub">Both of you need Spotify Premium</p>
            </div>

            <!-- Connected / now playing state -->
            <div class="spotify-player" id="spotifyPlayer" style="display:none">

                <div class="now-playing-label">
                    <span class="np-dot"></span>
                    <span id="nowPlayingWho">Now Playing</span>
                </div>

                <div class="track-info">
                    <div class="album-art-wrapper">
                        <img id="albumArt" src="" alt="Album art" class="album-art" />
                        <div class="album-art-glow"></div>
                    </div>
                    <div class="track-details">
                        <div class="track-name" id="trackName">—</div>
                        <div class="track-artist" id="trackArtist">—</div>
                        <div class="track-album" id="trackAlbum">—</div>
                    </div>
                </div>

                <!-- Progress bar -->
                <div class="progress-section">
                    <span class="time-label" id="currentTime">0:00</span>
                    <div class="progress-bar-bg" id="progressBarBg">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <span class="time-label" id="totalTime">0:00</span>
                </div>

                <!-- Playback controls -->
                <div class="playback-controls">
                    <button class="ctrl-btn" id="prevBtn" title="Previous">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                        </svg>
                    </button>
                    <button class="ctrl-btn play-pause-btn" id="playPauseBtn" title="Play/Pause">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" title="Next">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zm2-8.14 4.97 3.5L8 17.14V9.86zM16 6h2v12h-2z" />
                        </svg>
                    </button>
                </div>

                <!-- Volume -->
                <div class="volume-section">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80" />
                </div>

                <!-- Sync status -->
                <div class="sync-status" id="syncStatus">
                    <span class="sync-dot" id="syncDot"></span>
                    <span id="syncText">Playing together 🌙</span>
                </div>
            </div>
        </section>

    </main>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <!-- Spotify Web Playback SDK -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="room.js"></script>
</body>

</html>
